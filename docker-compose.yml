# ============================================================
# Portainer stack - balaidiklat.bkpp.dev
# ------------------------------------------------------------
# Deploy via Portainer > Stacks > Add stack.
# Set the environment variables in the Portainer stack editor
# (or paste an .env). See .env.production.example for the list.
#
# Assumes an external Traefik reverse proxy attached to a shared
# network named "traefik" handling TLS via Let's Encrypt.
# ============================================================

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/rufrufy/balaidiklat:latest}
    # If you build directly on the host running Portainer instead of
    # pulling a prebuilt image, comment out `image` above and uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      APP_NAME: "${APP_NAME:-Balai Diklat}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "https://balaidiklat.bkpp.dev"
      APP_LOCALE: "${APP_LOCALE:-id}"
      APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-en}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Jakarta}"

      TZ: "${TZ:-Asia/Jakarta}"

      LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
      LOG_LEVEL: "${LOG_LEVEL:-error}"

      # Database - defaults point to the existing external MySQL.
      DB_CONNECTION: "${DB_CONNECTION:-mysql}"
      DB_HOST: "${DB_HOST:-103.101.52.17}"
      DB_PORT: "${DB_PORT:-33064}"
      DB_DATABASE: "${DB_DATABASE:-balaidiklat}"
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD}"

      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      CACHE_STORE: "${CACHE_STORE:-database}"

      BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-log}"
      FILESYSTEM_DISK: "${FILESYSTEM_DISK:-local}"

      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
      MAIL_PORT: "${MAIL_PORT:-2525}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-no-reply@bkpp.dev}"
      MAIL_FROM_NAME: "${APP_NAME:-Balai Diklat}"

      KIRIMCHAT_BASE_URL: "${KIRIMCHAT_BASE_URL:-https://api-prod.kirim.chat/api/v1/public}"
      KIRIMCHAT_API_KEY: "${KIRIMCHAT_API_KEY:-}"
      KIRIMCHAT_WEBHOOK_SECRET: "${KIRIMCHAT_WEBHOOK_SECRET:-}"
      KIRIMCHAT_REQUIRE_WEBHOOK_SECRET: "${KIRIMCHAT_REQUIRE_WEBHOOK_SECRET:-false}"

      ERETRIBUSI_BASE_URL: "${ERETRIBUSI_BASE_URL:-}"
      ERETRIBUSI_API_KEY: "${ERETRIBUSI_API_KEY:-}"
      ERETRIBUSI_SEND_PATH: "${ERETRIBUSI_SEND_PATH:-/api/billing}"

      # Bapenda e-Retribusi API
      BAPENDA_BASE_URL: "${BAPENDA_BASE_URL:-https://eretribusi.semarangkota.go.id}"
      BAPENDA_VCODE: "${BAPENDA_VCODE:-FLzq6tI6}"
      BAPENDA_TOKEN: "${BAPENDA_TOKEN:-QGnyjTnfSR1G76V1bDKEIAcXZ1UOeYi6qR2wiajcgjjC39fTR7E3gtHZ0jVwzwyfF2IGuFvxEykwtzdxwsiJD4fMO8FdMSfeP0nQ}"
      BAPENDA_STORE_PATH: "${BAPENDA_STORE_PATH:-/api/v2/prod/retribusi/store}"
      BAPENDA_KODE_OPD: "${BAPENDA_KODE_OPD:-3.1.03.01}"
      BAPENDA_KODE_REKENING: "${BAPENDA_KODE_REKENING:-4.1.02.02.01.0005}"
      BAPENDA_REKENING_ID: "${BAPENDA_REKENING_ID:-76}"

      # Bapenda QRIS API
      BAPENDA_QRIS_BASE_URL: "${BAPENDA_QRIS_BASE_URL:-http://103.101.52.67:13000}"
      BAPENDA_QRIS_PATH: "${BAPENDA_QRIS_PATH:-/api/bapenda/getLinkQris}"
      BAPENDA_QRIS_USER: "${BAPENDA_QRIS_USER:-B4p3ndasmG}"
      BAPENDA_QRIS_PASS: "${BAPENDA_QRIS_PASS:-\"LOtO]^aQ}5bsOS+WjZ'(\"}"

      # Bapenda callback (notifikasi status terbayar)
      BAPENDA_CALLBACK_TOKEN: "${BAPENDA_CALLBACK_TOKEN:-bapenda_balaidiklat_2026_secret_token}"

      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.balaidiklat.rule=Host(`balaidiklat.bkpp.dev`)"
      - "traefik.http.routers.balaidiklat.entrypoints=websecure"
      - "traefik.http.routers.balaidiklat.tls=true"
      - "traefik.http.routers.balaidiklat.tls.certresolver=letsencrypt"
      - "traefik.http.services.balaidiklat.loadbalancer.server.port=80"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.balaidiklat-http.rule=Host(`balaidiklat.bkpp.dev`)"
      - "traefik.http.routers.balaidiklat-http.entrypoints=web"
      - "traefik.http.routers.balaidiklat-http.middlewares=balaidiklat-redirect"
      - "traefik.http.middlewares.balaidiklat-redirect.redirectscheme.scheme=https"

volumes:
  app_storage:

networks:
  # Shared external network where Traefik lives. Create once with:
  #   docker network create traefik
  traefik:
    external: true
