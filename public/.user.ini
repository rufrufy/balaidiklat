; Allow uploads slightly above the 2MB business limit so Laravel's
; max:2048 (2MB) validation is the real gate and returns a clear error,
; instead of PHP silently dropping a ~2MB file before Laravel sees it.
upload_max_filesize = 8M
post_max_size = 16M
; Explicit writable temp dir so uploads are not dropped with
; UPLOAD_ERR_NO_TMP_DIR (which makes the uploaded file invalid and
; triggers "Path cannot be empty" in store()).
upload_tmp_dir = "C:/laragon/www/balaidiklat/storage/app/uploads-tmp"
